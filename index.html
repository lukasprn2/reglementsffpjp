<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Arbitre Pétanque Pro</title>

<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; margin:0; background:#111; color:#fff;}
nav { background:#000; padding:10px; text-align:center;}
nav button { margin:5px; padding:10px; }
.section { display:none; padding:20px;}
.active { display:block;}
.card { background:#222; padding:15px; margin:10px 0; border-radius:10px;}
.good { color:lightgreen;}
.bad { color:red;}
</style>
</head>

<body>

<nav>
<button onclick="show('cours')">📚 Articles</button>
<button onclick="show('exam')">🎓 Examen</button>
<button onclick="show('simu')">⚖️ Simulation</button>
</nav>

<!-- ARTICLES -->
<div id="cours" class="section active">
<h2>📚 Règlements</h2>
<div id="articles"></div>
</div>

<!-- EXAMEN -->
<div id="exam" class="section">
<h2>🎓 Examen officiel</h2>
<p id="question"></p>
<input id="rep">
<button onclick="valider()">Valider</button>
<p id="resultat"></p>
</div>

<!-- SIMULATION -->
<div id="simu" class="section">
<h2>⚖️ Cas arbitre</h2>
<p id="cas"></p>
<button onclick="repond(true)">Bonne décision</button>
<button onclick="repond(false)">Mauvaise décision</button>
<p id="rescas"></p>
</div>

<script>

let data = {};

// CHARGER LES ARTICLES
fetch("reglements.json")
.then(res => res.json())
.then(json => {
data = json;
afficherArticles();
});

function afficherArticles(){
let div = document.getElementById("articles");

data.petanque.forEach(a => {
let el = document.createElement("div");
el.className="card";
el.innerHTML = "<b>"+a.article+" - "+a.titre+"</b><br>"+a.contenu;
div.appendChild(el);
});
}

// NAVIGATION
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// EXAMEN
let questions = [
{q:"Distance du but ?", a:"6 à 10 mètres"},
{q:"Score pour gagner ?", a:"13"}
];

let i=0;
function charger(){
document.getElementById("question").innerText = questions[i].q;
}
function valider(){
let val = document.getElementById("rep").value.toLowerCase();
document.getElementById("resultat").innerText =
val.includes(questions[i].a.toLowerCase()) ? "✅" : "❌";
i=(i+1)%questions.length;
charger();
}
charger();

// SIMULATION
let cas = [
{q:"Le joueur mord le cercle", ok:false},
{q:"Le but sort du terrain", ok:true}
];

let c=0;
function loadCas(){
document.getElementById("cas").innerText = cas[c].q;
}
function repond(ans){
document.getElementById("rescas").innerText =
(ans===cas[c].ok)?"✅ Bonne décision":"❌ Mauvaise";
c=(c+1)%cas.length;
loadCas();
}
loadCas();

// PWA
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
