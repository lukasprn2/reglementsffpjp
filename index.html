<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Règlement Pétanque</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">
<style>
body { font-family: Arial; margin:0; background:#f4f4f4;}
nav { background:#2c3e50; padding:10px;}
nav button { margin:5px; padding:10px;}
.section { display:none; padding:20px;}
.active { display:block;}
.card { background:white; padding:15px; margin:10px 0; border-radius:10px;}
</style>
</head>

<body>

<nav>
<button onclick="show('cours')">📖 Cours</button>
<button onclick="show('quiz')">🧠 Quiz</button>
<button onclick="show('cas')">⚖️ Cas pratiques</button>
</nav>

<div id="cours" class="section active">
<h2>📖 Articles</h2>
<div id="articles"></div>
</div>

<div id="quiz" class="section">
<h2>🧠 Quiz</h2>
<p id="q"></p>
<input id="a">
<button onclick="check()">Valider</button>
<p id="res"></p>
</div>

<div id="cas" class="section">
<h2>⚖️ Cas arbitre</h2>
<p id="case"></p>
<button onclick="answerCase(true)">Décision correcte</button>
<button onclick="answerCase(false)">Décision incorrecte</button>
<p id="caseRes"></p>
</div>

<script>

// ARTICLES (exemple, on va compléter ensuite)
const articles = [
"Art 1 : Formation des équipes",
"Art 2 : Caractéristiques des boules",
"Art 3 : But valable",
];

// AFFICHAGE ARTICLES
let container = document.getElementById("articles");
articles.forEach(a => {
let div = document.createElement("div");
div.className="card";
div.innerText = a;
container.appendChild(div);
});

// NAVIGATION
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// QUIZ
const quiz = [
{q:"Distance pétanque ?",a:"6-10"},
{q:"Score ?",a:"13"}
];

let i=0;
function load(){
document.getElementById("q").innerText = quiz[i].q;
}
function check(){
let val = document.getElementById("a").value;
document.getElementById("res").innerText =
val.includes(quiz[i].a) ? "✅" : "❌";
i=(i+1)%quiz.length;
load();
}
load();

// CAS PRATIQUES
const cases = [
{q:"Le but sort du terrain ?", ok:true},
{q:"Un joueur dépasse le temps ?", ok:true}
];

let c=0;
function loadCase(){
document.getElementById("case").innerText = cases[c].q;
}
function answerCase(ans){
document.getElementById("caseRes").innerText =
(ans===cases[c].ok)?"✅ Bonne décision":"❌ Mauvaise";
c=(c+1)%cases.length;
loadCase();
}
loadCase();

// SERVICE WORKER
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
